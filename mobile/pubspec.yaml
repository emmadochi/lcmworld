name: lcmworld
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  permission_handler: ^12.0.3
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  shared_preferences: ^2.5.3
  device_apps: ^2.2.0
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
